<meta charset="UTF-8">

<title>ディフェンス分析 — Rugby Analytics</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { color-scheme: light;
  --page:#f9f9f7; --surface:#fcfcfb; --ink-1:#0b0b0b; --ink-2:#52514e; --ink-muted:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,0.10);
  --bar:#2a78d6; --bar-soft:#9ec5f4; --radius:8px; --gap:14px; }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) { color-scheme: dark;
  --page:#0d0d0d; --surface:#1a1a19; --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-muted:#898781;
  --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.10); --bar:#3987e5; --bar-soft:#1c5cab; } }
body { font-family: system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--page); color:var(--ink-1); line-height:1.5; }
.topnav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;}
.topnav .brand{font-weight:700;font-size:15px;color:var(--ink-1);text-decoration:none;white-space:nowrap;}
.topnav .navlinks{display:flex;gap:4px;flex-wrap:wrap;}
.topnav .navlinks a{font-size:13px;color:var(--ink-2);text-decoration:none;padding:6px 12px;border-radius:6px;white-space:nowrap;}
.topnav .navlinks a:hover{background:color-mix(in srgb,var(--ink-1) 7%,transparent);}
.topnav .navlinks a.active{background:#2a78d6;color:#fff;}
.wrap { max-width:1280px; margin:0 auto; padding:18px var(--gap) 32px; }
header h1 { font-size:20px; font-weight:700; }
header .sub { font-size:12.5px; color:var(--ink-2); margin-top:2px; }
.filters { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:16px 0 6px; }
.fg { display:flex; align-items:center; gap:6px; }
.fg label { font-size:12px; color:var(--ink-2); }
.fg select { padding:6px 10px; font-size:13px; color:var(--ink-1); max-width:230px;
  background:var(--surface); border:1px solid var(--border); border-radius:6px; }
.fg select:disabled { opacity:.45; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:var(--gap); margin:10px 0 var(--gap); }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px; }
.kpi .lbl { font-size:12px; color:var(--ink-2); margin-bottom:2px; }
.kpi .val { font-size:24px; font-weight:650; }
.kpi .note { font-size:11.5px; color:var(--ink-muted); }
.cards { display:grid; grid-template-columns:2fr 1fr; gap:var(--gap); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
.card.full { grid-column:1/-1; }
.card h3 { font-size:14px; font-weight:600; margin-bottom:2px; }
.card .desc { font-size:12px; color:var(--ink-muted); margin-bottom:10px; }
svg text { font-family: inherit; }
.hit { fill: transparent; } .hit:hover { fill: color-mix(in srgb, var(--ink-1) 5%, transparent); }
#tooltip { position:fixed; pointer-events:none; z-index:30; display:none; background:var(--surface); color:var(--ink-1);
  border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 14px rgba(0,0,0,0.18); padding:9px 12px; font-size:12px; min-width:170px; }
#tooltip .tt-title { font-weight:600; margin-bottom:5px; }
#tooltip .tt-row { display:flex; align-items:center; gap:10px; margin:2px 0; }
#tooltip .tt-val { font-weight:600; margin-left:auto; font-variant-numeric:tabular-nums; }
#tooltip .tt-lbl { color:var(--ink-2); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { text-align:right; padding:8px 9px; border-bottom:2px solid var(--baseline); color:var(--ink-2);
  font-size:11.5px; font-weight:600; white-space:nowrap; cursor:pointer; user-select:none; position:sticky; top:0; background:var(--surface); }
thead th:first-child { text-align:left; }
tbody td { padding:7px 9px; border-bottom:1px solid var(--grid); text-align:right; font-variant-numeric:tabular-nums; }
tbody td:first-child { text-align:left; font-weight:600; }
tbody td.txt { text-align:left; }
tbody tr:hover { background: color-mix(in srgb, var(--ink-1) 3%, transparent); }
.tbl-scroll { max-height:520px; overflow-y:auto; }
footer { margin-top:16px; font-size:12px; color:var(--ink-muted); }
@media (max-width:820px){ .cards{grid-template-columns:1fr;} }
</style>

  teamCols:[['name','チーム','txt'],['gp','試合','int'],['tackles','タックル/試合','f1'],['succ','成功率%','pct'],['dom','ドミナント%','pct'],['missed','ミス/試合','f1'],['jackal','ジャッカル/試合','f1'],['jackalp','ジャッカル成功%','pct'],['towon','タックルTO/試合','f1'],['toc','被TO/試合','f1']],
  teamRow:(name,c)=>{var s=c.tk_complete+c.tk_passive+c.tk_sack+c.tk_forced_touch+c.tk_try_saver+c.tk_turnover_won+c.tk_offload_allowed+c.tk_pen_conceded; return {name,gp:c.__m,tackles:c.__m?c.tackles/c.__m:0,succ:c.tackles?s/c.tackles*100:0,dom:c.tackles?c.tk_dominant/c.tackles*100:0,missed:c.__m?c.tk_missed/c.__m:0,jackal:c.__m?c.jackal/c.__m:0,jackalp:c.jackal?c.jackal_won/c.jackal*100:0,towon:c.__m?c.tk_turnover_won/c.__m:0,toc:c.__m?c.to_conceded/c.__m:0};},
  player:{ minKey:'gp', min:5, minLabel:'出場', cap:200,
    cols:[['name','選手','txt'],['team','チーム','txt'],['gp','出場','int'],['tackles','タックル/試合','f1'],['succ','成功率%','pct'],['missed','ミス/試合','f1'],['jackal','ジャッカル/試合','f1'],['dom','ドミナント/試合','f1']],
    row:(name,team,c,gp)=>({name,team,gp,__min:gp,tackles:gp?c.tackles/gp:0,succ:c.tackles?(c.tk_suc+c.tk_ineff)/c.tackles*100:0,missed:gp?c.tk_missed/gp:0,jackal:gp?c.jackal/gp:0,dom:gp?c.tk_dominant/gp:0}) }
};
const NS='http://www.w3.org/2000/svg';
const TM=RAW.tmet, PM=RAW.pmet;
const tIdx={}; TM.forEach((m,i)=>tIdx[m]=4+i);
const pIdx={}; PM.forEach((m,i)=>pIdx[m]=5+i);   // P row: [c,season,tm,pl,gp,...pmet]
const METRICS=CFG.metrics;
const MIN_GAMES=3;
function metricByKey(k){ return METRICS.find(m=>m.key===k)||METRICS[0]; }
function cssColor(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function fmt(v,f){ if(f==='pct')return v.toFixed(1)+'%'; if(f==='f2')return v.toFixed(2); if(f==='f1')return v.toFixed(1); if(f==='txt')return v; return Math.round(v).toLocaleString(); }
function num(v){ return Math.round(v).toLocaleString(); }
function f1(v){ return v.toFixed(1); }
function el(tag,attrs,parent){ const e=document.createElementNS(NS,tag); for(const k in attrs)e.setAttribute(k,attrs[k]); if(parent)parent.appendChild(e); return e; }
function emptyC(metrics){ const c={__m:0}; metrics.forEach(m=>c[m]=0); return c; }

const F={ comp:()=>v('f-comp'), season:()=>v('f-season'), round:()=>v('f-round'), team:()=>v('f-team'), metric:()=>v('f-metric') };
function v(id){ return document.getElementById(id).value; }
function tFilt(ig){ ig=ig||{}; const comp=F.comp(),season=F.season(),round=F.round(),team=F.team();
  return RAW.T.filter(r=>(ig.comp||comp==='all'||RAW.comps[r[0]]===comp)&&(ig.season||season==='all'||String(r[1])===season)&&(ig.round||round==='all'||String(r[2])===round)&&(ig.team||team==='all'||RAW.teams[r[3]]===team)); }
function pFilt(){ const comp=F.comp(),season=F.season(),team=F.team();
  return RAW.P.filter(r=>(comp==='all'||RAW.comps[r[0]]===comp)&&(season==='all'||String(r[1])===season)&&(team==='all'||RAW.teams[r[2]]===team)); }
function accumTeam(rows,keyFn){ const map=new Map();
  for(const r of rows){ const k=keyFn(r); let c=map.get(k); if(!c){c=emptyC(TM);map.set(k,c);} TM.forEach(m=>c[m]+=r[tIdx[m]]); c.__m++; } return map; }
function accumPlayer(rows){ const map=new Map();
  for(const r of rows){ const k=r[3]; let e=map.get(k); if(!e){e={c:emptyC(PM),gp:0,team:new Map()};map.set(k,e);} PM.forEach(m=>e.c[m]+=r[pIdx[m]]); e.gp+=r[4]; e.team.set(r[2],(e.team.get(r[2])||0)+r[4]); } return map; }

const tt=document.getElementById('tooltip');
function showTip(evt,title,rows){ tt.replaceChildren(); const t=document.createElement('div'); t.className='tt-title'; t.textContent=title; tt.appendChild(t);
  rows.forEach(([lbl,val])=>{ const r=document.createElement('div'); r.className='tt-row'; const a=document.createElement('span'); a.className='tt-lbl'; a.textContent=lbl; const b=document.createElement('span'); b.className='tt-val'; b.textContent=val; r.appendChild(a); r.appendChild(b); tt.appendChild(r); });
  tt.style.display='block'; moveTip(evt); }
function moveTip(evt){ const pad=14; let x=evt.clientX+pad,y=evt.clientY+pad; const r=tt.getBoundingClientRect(); if(x+r.width>innerWidth-8)x=evt.clientX-r.width-pad; if(y+r.height>innerHeight-8)y=evt.clientY-r.height-pad; tt.style.left=x+'px'; tt.style.top=y+'px'; }
function hideTip(){ tt.style.display='none'; }

function hBar(containerId,items,opts){ const box=document.getElementById(containerId); box.replaceChildren();
  const W=Math.max(box.clientWidth||520,360); const labelW=opts.labelW||150, rightW=58, padT=6, padB=22, rowH=26, barH=16;
  const H=padT+items.length*rowH+padB, plotW=W-labelW-rightW;
  const svg=el('svg',{width:'100%',height:H,viewBox:`0 0 ${W} ${H}`,role:'img'},box);
  const maxV=Math.max(1e-9,...items.map(d=>d.value)); const mag=Math.pow(10,Math.max(0,String(Math.floor(maxV)).length-2));
  const niceMax=Math.max(mag,Math.ceil(maxV/(4*mag))*4*mag)||1; const xs=v=>labelW+(v/niceMax)*plotW; const NT=4;
  for(let i=0;i<=NT;i++){ const gv=niceMax/NT*i; el('line',{x1:xs(gv),y1:padT,x2:xs(gv),y2:H-padB,stroke:cssColor('--grid'),'stroke-width':1},svg);
    const t=el('text',{x:xs(gv),y:H-6,'text-anchor':'middle','font-size':10.5,fill:cssColor('--ink-muted')},svg);
    t.textContent=opts.fmt==='pct'?gv.toFixed(0):(opts.fmt==='f2'||opts.fmt==='f1'?gv.toFixed(1):(gv>=10000?Math.round(gv/1000)+'k':Math.round(gv).toLocaleString())); }
  el('line',{x1:labelW,y1:padT,x2:labelW,y2:H-padB,stroke:cssColor('--baseline'),'stroke-width':1},svg);
  items.forEach((d,i)=>{ const y=padT+i*rowH+(rowH-barH)/2; const lab=el('text',{x:labelW-8,y:y+barH/2+4,'text-anchor':'end','font-size':11.5,fill:cssColor('--ink-2')},svg);
    lab.textContent=d.name.length>16?d.name.slice(0,15)+'…':d.name; const w=Math.max(0,xs(d.value)-labelW);
    el('rect',{x:labelW,y,width:w,height:barH,rx:3,fill:cssColor(opts.soft?'--bar-soft':'--bar')},svg);
    const r=el('text',{x:labelW+w+6,y:y+barH/2+4,'font-size':11,'font-weight':600,fill:cssColor('--ink-1')},svg); r.textContent=fmt(d.value,opts.fmt);
    const hit=el('rect',{class:'hit',x:0,y:padT+i*rowH,width:W,height:rowH},svg);
    hit.addEventListener('pointermove',e=>showTip(e,d.name,d.tip||[[opts.title,fmt(d.value,opts.fmt)]])); hit.addEventListener('pointerleave',hideTip); });
}

let sortT={col:CFG.teamCols[1][0],dir:'desc'}, sortP=CFG.player?{col:CFG.player.cols[2][0],dir:'desc'}:null;
const TEAM_CAP=25;
function render(){
  const rows=tFilt(); const tot=emptyC(TM); let M=0; rows.forEach(r=>{TM.forEach(m=>tot[m]+=r[tIdx[m]]); M++;}); tot.__m=M;
  const mk=metricByKey(F.metric());
  CFG.kpis.forEach((k,i)=>{ document.getElementById('kpi'+i).textContent=k.val(tot); const n=document.getElementById('kpi'+i+'n'); if(n)n.textContent=(typeof k.note==='function')?k.note(tot):(k.note||''); });
  const teamMap=accumTeam(rows,r=>RAW.teams[r[3]]);
  let teams=[...teamMap.entries()].map(([name,c])=>({name,c,value:mk.val(c)})).filter(t=>t.c.__m>=MIN_GAMES);
  if(mk.denom){ teams=teams.filter(t=>t.c[mk.denom]>=mk.min); }
  teams.sort((a,b)=>b.value-a.value); const capped=teams.length>TEAM_CAP; if(capped)teams=teams.slice(0,TEAM_CAP);
  document.getElementById('rank-title').textContent=`チーム別ランキング — ${mk.label}`;
  document.getElementById('rank-desc').textContent=(capped?`上位${TEAM_CAP}チーム。`:'')+`${MIN_GAMES}試合以上。`+(mk.denom?'標本の少ないチームは除外。':'')+'ホバーで内訳';
  hBar('c-team',teams.map(t=>({name:t.name,value:t.value,tip:CFG.tooltip(t.c)})),{fmt:mk.fmt,title:mk.label,labelW:150});
  const compRows=tFilt({comp:true}); const compMap=accumTeam(compRows,r=>RAW.comps[r[0]]);
  let comps=[...compMap.entries()].map(([name,c])=>({name,value:mk.val(c),c})); comps.sort((a,b)=>b.value-a.value);
  document.getElementById('comp-title').textContent=`コンペティション比較 — ${mk.label}`;
  hBar('c-comp',comps.map(c=>({name:c.name,value:c.value,tip:CFG.tooltip(c.c)})),{fmt:mk.fmt,title:mk.label,labelW:170,soft:true});
  const teamRows=[...teamMap.entries()].map(([name,c])=>CFG.teamRow(name,c));
  drawTable('tbl',CFG.teamCols,teamRows,sortT,(col)=>{ if(sortT.col===col)sortT.dir=sortT.dir==='asc'?'desc':'asc'; else sortT={col,dir:CFG.teamCols.find(c=>c[0]===col)[2]==='txt'?'asc':'desc'}; render(); });
  if(CFG.player) renderPlayerTable();
}
function renderPlayerTable(){
  const map=accumPlayer(pFilt()); const modal=m=>[...m.entries()].sort((a,b)=>b[1]-a[1])[0][0];
  let data=[...map.entries()].map(([pl,e])=>CFG.player.row(RAW.players[pl],RAW.teams[modal(e.team)],e.c,e.gp));
  const eligible=data.filter(d=>d.__min>=CFG.player.min); data=eligible; data.sort((a,b)=>cmp(a,b,sortP));
  const cap=CFG.player.cap||200; const capped=data.length>cap; data=data.slice(0,cap);
  document.getElementById('ptbl-desc').textContent=`${CFG.player.minLabel}${CFG.player.min}以上の選手${eligible.length.toLocaleString()}人中`+(capped?`、現ソート上位${cap}人。`:`全員。`)+' 数量は1試合平均・ラウンドフィルタ適用外';
  drawTable('ptbl',CFG.player.cols,data,sortP,(col)=>{ if(sortP.col===col)sortP.dir=sortP.dir==='asc'?'desc':'asc'; else sortP={col,dir:CFG.player.cols.find(c=>c[0]===col)[2]==='txt'?'asc':'desc'}; render(); });
}
function cmp(a,b,st){ const x=a[st.col],y=b[st.col]; const c=x<y?-1:x>y?1:0; return st.dir==='asc'?c:-c; }
function drawTable(id,cols,data,st,onSort){ data.sort((a,b)=>cmp(a,b,st)); const wrap=document.getElementById(id); wrap.replaceChildren();
  const table=document.createElement('table'); const thead=document.createElement('thead'); const hr=document.createElement('tr');
  cols.forEach(([k,l,t])=>{ const th=document.createElement('th'); th.textContent=l+(st.col===k?(st.dir==='asc'?' ▲':' ▼'):''); if(t==='txt')th.style.textAlign='left'; th.addEventListener('click',()=>onSort(k)); hr.appendChild(th); });
  thead.appendChild(hr); table.appendChild(thead); const tb=document.createElement('tbody');
  data.forEach(row=>{ const tr=document.createElement('tr'); cols.forEach(([k,l,t])=>{ const td=document.createElement('td'); const val=row[k]; if(t==='txt'){td.className='txt'; td.textContent=val;} else td.textContent=fmt(val,t); tr.appendChild(td); }); tb.appendChild(tr); });
  table.appendChild(tb); wrap.appendChild(table); }
function repop(sel,values,current,allLabel){ const s=document.getElementById(sel); s.replaceChildren(); const a=document.createElement('option'); a.value='all'; a.textContent=allLabel; s.appendChild(a);
  values.forEach(v=>{ const o=document.createElement('option'); o.value=String(v); o.textContent=String(v); s.appendChild(o); }); s.value=values.map(String).includes(current)?current:'all'; }
function syncFilters(){ const comp=F.comp(); const rows=RAW.T.filter(r=>comp==='all'||RAW.comps[r[0]]===comp);
  repop('f-season',[...new Set(rows.map(r=>r[1]))].sort(),F.season(),'全シーズン'); const rSel=document.getElementById('f-round');
  if(comp==='all'){ rSel.replaceChildren(); const o=document.createElement('option');o.value='all';o.textContent='全節';rSel.appendChild(o); rSel.disabled=true; }
  else { const season=F.season(); const rr=rows.filter(r=>season==='all'||String(r[1])===season); repop('f-round',[...new Set(rr.map(r=>r[2]))].sort((a,b)=>a-b),F.round(),'全節'); rSel.disabled=false; }
  const season=F.season(); const tr=rows.filter(r=>season==='all'||String(r[1])===season); repop('f-team',[...new Set(tr.map(r=>RAW.teams[r[3]]))].sort(),F.team(),'全チーム'); }
(function(){ document.title=CFG.doctitle; document.getElementById('page-title').textContent=CFG.title; document.getElementById('page-sub').textContent=CFG.sub; document.getElementById('page-foot').textContent=CFG.foot;
  const nav=document.querySelector(`.navlinks a[data-nav="${CFG.active}"]`); if(nav)nav.classList.add('active');
  const kwrap=document.getElementById('kpis'); CFG.kpis.forEach((k,i)=>{ const d=document.createElement('div'); d.className='kpi'; d.innerHTML=`<div class="lbl"></div><div class="val" id="kpi${i}">–</div><div class="note" id="kpi${i}n"></div>`; d.querySelector('.lbl').textContent=k.label; kwrap.appendChild(d); });
  if(!CFG.player){ const pc=document.getElementById('player-card'); if(pc)pc.remove(); }
  const cs=document.getElementById('f-comp'); RAW.comps.forEach(c=>{ const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o); });
  const ms=document.getElementById('f-metric'); METRICS.forEach(m=>{ const o=document.createElement('option');o.value=m.key;o.textContent=m.label;ms.appendChild(o); }); ms.value=METRICS[0].key;
  syncFilters();
  document.getElementById('f-comp').addEventListener('change',()=>{ document.getElementById('f-round').value='all'; syncFilters(); render(); });
  document.getElementById('f-season').addEventListener('change',()=>{ syncFilters(); render(); });
  ['f-round','f-team','f-metric'].forEach(id=>document.getElementById(id).addEventListener('change',render));
  render(); let rT; addEventListener('resize',()=>{ clearTimeout(rT); rT=setTimeout(render,150); });
  if(window.matchMedia) matchMedia('(prefers-color-scheme: dark)').addEventListener('change',render);
})();
</script>
</body>
